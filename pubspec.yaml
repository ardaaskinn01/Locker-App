name: lockapp
description: Doomscrolling prevention and language learning app.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # Firebase
  firebase_core: ^2.30.0
  cloud_firestore: ^4.17.0
  firebase_auth: ^4.19.0
  firebase_analytics: ^10.10.0
  firebase_crashlytics: ^3.5.0

  # Local Persistence & Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  http: ^1.2.1

  # UI Components & Icons
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  animated_flip_counter: ^0.2.6
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  dotted_border: ^2.1.0
  shimmer: ^3.0.0
  confetti: ^0.7.0

  # Native Communication & Services
  permission_handler: ^11.3.0
  google_mobile_ads: ^6.0.0
  flutter_local_notifications: ^17.2.4
  workmanager: ^0.6.0
  timezone: ^0.9.4
  connectivity_plus: any
  package_info_plus: any
  url_launcher: any
  audioplayers: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
